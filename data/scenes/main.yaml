skybox:
  faces:
    - "data/skybox/px.png"
    - "data/skybox/nx.png"
    - "data/skybox/py.png"
    - "data/skybox/ny.png"
    - "data/skybox/pz.png"
    - "data/skybox/nz.png"
root:
  name: "MainScene"
  origin: [0, 0, 0]
  rotation: [0, 0, 0]
  scale: [1, 1, 1]
  children:
    - name: "Ground"
      origin: [0, -2, 0]
      components:
        - type: "Mesh"
          shape: "box"
          width: 120.0
          height: 0.5
          depth: 100.0
          color: [1, 0, 0]
        - type: "RigidBody"
          mass: 0.0
    - name: "RoadVisuals"
      rotation: [0, 0, 0]
      scale: [5, 1, 5]
      origin: [0, -1.75, -1.35]
      components:
        - type: "Mesh"
          shape: "model" 
          path: "data/models/road/road.obj"
    - name: "Car"
      origin: [0, 2, 0]
      components:
        - type: "Mesh"
          shape: "box"
          width: 1.5
          height: 0.5
          depth: 4.5
        - type: "Vehicle"
          mass: 800.0
          wheels:
            - node: "WheelFrontLeft"
              connectionPoint: [-0.8, 0.0, 1.2]
              suspensionRestLength: 0.6
              radius: 0.3
              isFrontWheel: true
            - node: "WheelFrontRight"
              connectionPoint: [0.8, 0.0, 1.2]
              suspensionRestLength: 0.6
              radius: 0.3
              isFrontWheel: true
            - node: "WheelBackLeft"
              connectionPoint: [-0.8, 0.0, -1.3]
              suspensionRestLength: 0.6
              radius: 0.3
              isFrontWheel: false
            - node: "WheelBackRight"
              connectionPoint: [0.8, 0.0, -1.3]
              suspensionRestLength: 0.6
              radius: 0.3
              isFrontWheel: false
        - type: "CarController"
        - type: "CameraCycle"
      children:
        - name: "OuterCameraAnchor"
          origin: [0, 1.5, -6]
          rotation: [0, 180, 0]
          components:
            - type: "Camera"
            - type: "OrbitalCameraController"
              orbitRadius: 7
              lookSensitivity: 75
        - name: "InnerCameraAnchor"
          origin: [0.5, 0.5, 0.9]
          rotation: [0, 180, 0]
          components:
            - type: "Camera"
            - type: "CameraController"
        - name: "CarVisuals"
          rotation: [0, -90, 0]
          scale: [0.5, 0.5, 0.5]
          origin: [0, -1.25, -1.35]
          components:
            - type: "Mesh"
              shape: "model" 
              path: "data/models/van/van.obj"
    - name: "WheelFrontLeft"
      components:
        - type: "Mesh"
          shape: "cylinder"
          radius: 0.3
          height: 0.2
          color: [0.1, 0.1, 0.1]
    - name: "WheelFrontRight"
      components:
        - type: "Mesh"
          shape: "cylinder"
          radius: 0.3
          height: 0.2
          color: [0.1, 0.1, 0.1]
    - name: "WheelBackLeft"
      components:
        - type: "Mesh"
          shape: "cylinder"
          radius: 0.3
          height: 0.2
          color: [0.1, 0.1, 0.1]
    - name: "WheelBackRight"
      components:
        - type: "Mesh"
          shape: "cylinder"
          radius: 0.3
          height: 0.2
          color: [0.1, 0.1, 0.1]
